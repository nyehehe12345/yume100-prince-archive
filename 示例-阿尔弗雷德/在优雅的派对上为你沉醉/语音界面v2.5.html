<!DOCTYPE html>
<html lang="zh">

    <a href="../汇总页v2.0.html" class="return-btn">
        <img src="../picture/返回.png" alt="返回按钮">

    <div class="main-container">
        <div class="container">
            <div class="left-panel">
                <div class="character-art-container">
                    <button id="zoomBtn" class="zoom-btn" style="background-image: url('../picture/放大.png')"></button>
                    <button id="prevExpressionBtn" class="expression-nav-btn prev-btn" style="background-image: url('../picture/上.png')"></button>
                    <button id="nextExpressionBtn" class="expression-nav-btn next-btn" style="background-image: url('../picture/下.png')"></button>
                    <canvas id="characterArt" width="1204" height="2378" class="character-art"></canvas>
                </div>
            </div>
            
            <div class="right-panel">
                <h1>阿尔弗雷德</h1>
                <h2>Alfred</h2>
                <div class="subtitle">在优雅的派对上为你沉醉</div>
                <div class="subtitle english-text">CV:横田纮一</div>
                
                <div class="profile-container">
                    <div class="profile-border profile-border-top"></div>
                    <div class="profile-content">
                        <div class="profile-title">档案</div>
                        <div class="profile-text">
                            红酒之国·多米尼亚的王子。从容的成年人,把能玩的都过了。父亲是吸血鬼,母亲是人类。在本国为了纪念新酒的解禁,举办了派对。
                        </div>
                    </div>
                    <div class="profile-border profile-border-bottom"></div>
                </div>
                
                <div class="voice-list" id="voiceList" style="height: 370px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
    
    <img src="../picture/小彩蛋.gif" alt="小彩蛋" class="gif-sticker" onerror="this.style.display='none'">
